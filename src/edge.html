<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --edge-pill: rgba(255, 255, 255, 0.2);
      --edge-pill-hover: rgba(255, 255, 255, 0.45);
    }
    [data-theme="light"] {
      --edge-pill: rgba(0, 0, 0, 0.12);
      --edge-pill-hover: rgba(0, 0, 0, 0.28);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 悬浮腰圆条 */
    .pill {
      width: 4px;
      height: 32px;
      border-radius: 2px;
      background: var(--edge-pill);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    body:hover .pill {
      width: 5px;
      height: 40px;
      border-radius: 2.5px;
      background: var(--edge-pill-hover);
    }
  </style>
</head>
<body>
  <div class="pill"></div>
  <script>
    var params = new URLSearchParams(window.location.search)
    document.documentElement.setAttribute('data-theme', params.get('theme') || 'dark')

    window.edgeAPI.onThemeChange(function (t) {
      document.documentElement.setAttribute('data-theme', t)
    })

    document.body.addEventListener('click', function () {
      window.edgeAPI.exitFocus()
    })
  </script>
</body>
</html>
