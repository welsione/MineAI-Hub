<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --edge-pill: rgba(255, 255, 255, 0.2);
      --edge-pill-hover: rgba(255, 255, 255, 0.45);
    }
    [data-theme="light"] {
      --edge-pill: rgba(0, 0, 0, 0.12);
      --edge-pill-hover: rgba(0, 0, 0, 0.28);
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    /* 悬浮腰圆条 */
    .pill {
      width: 5px;
      height: 56px;
      border-radius: 2.5px;
      background: var(--edge-pill);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      cursor: grab;
    }

    body.dragging .pill {
      width: 6px;
      height: 64px;
      border-radius: 3px;
      background: var(--edge-pill-hover);
    }

    body:hover .pill {
      width: 6px;
      height: 64px;
      border-radius: 3px;
      background: var(--edge-pill-hover);
    }
  </style>
</head>
<body>
  <div class="pill"></div>
  <script type="module" src="./edge.ts"></script>
</body>
</html>
