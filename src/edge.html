<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--edge-bg);
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .pill {
      width: 4px;
      height: 36px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.25);
      transition: all 0.3s ease;
    }

    [data-theme="light"] .pill {
      background: rgba(0, 0, 0, 0.15);
    }

    body:hover .pill {
      width: 5px;
      background: rgba(94, 234, 212, 0.6);
    }

    [data-theme="light"] body:hover .pill {
      background: rgba(13, 148, 136, 0.5);
    }
  </style>
</head>
<body>
  <div class="pill"></div>
  <script>
    var params = new URLSearchParams(window.location.search)
    document.documentElement.setAttribute('data-theme', params.get('theme') || 'dark')

    window.edgeAPI.onThemeChange(function (t) {
      document.documentElement.setAttribute('data-theme', t)
    })

    document.body.addEventListener('click', function () {
      window.edgeAPI.exitFocus()
    })
  </script>
</body>
</html>
