<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self'; object-src 'none'; frame-src 'none'; base-uri 'none'">
    <title>MineAI Hub</title>
    <script type="module" src="./app.ts"></script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="nav-section">
          <nav class="sidebar-actions" id="nav" aria-label="AI 服务导航"></nav>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-actions">
          <button class="icon-btn" id="reloadFrame" data-tooltip="重载">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          </button>
          <button class="icon-btn" id="pasteClipboard" data-tooltip="粘贴剪贴板">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>
          </button>
        </div>

        <div class="sidebar-bottom">
          <button class="icon-btn" id="toggleFocus" data-tooltip="专注模式">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
          <button class="icon-btn" id="toggleSettings" data-tooltip="设置">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          </button>
        </div>
      </aside>

      <!-- Settings Page -->
      <div class="settings-page" id="settingsPage">
        <div class="settings-header">
          <button class="settings-back" id="btnSettingsBack">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <span>设置</span>
        </div>
        <div class="settings-body">
          <div>
            <div class="settings-group-title">外观</div>
            <div class="settings-group">
              <div class="settings-row">
                <div>
                  <div class="settings-row-label">主题</div>
                  <div class="settings-row-hint" id="settingsThemeHint">暗色</div>
                </div>
                <button class="settings-toggle" id="settingsTheme">
                  <span class="settings-toggle-knob"></span>
                </button>
              </div>
              <div class="settings-row disabled">
                <div>
                  <div class="settings-row-label">窗口模式</div>
                  <div class="settings-row-hint">独立窗口</div>
                </div>
                <button class="settings-toggle on" disabled>
                  <span class="settings-toggle-knob"></span>
                </button>
              </div>
            </div>
          </div>
          <div>
            <div class="settings-group-title">快捷键</div>
            <div class="settings-group">
              <div class="shortcut-row">
                <div class="settings-row-label">全局快捷键</div>
                <div class="shortcut-input" id="shortcutInput" tabindex="0">Cmd+Shift+Space</div>
              </div>
              <div class="shortcut-row">
                <div class="settings-row-label">切换服务商</div>
                <div class="shortcut-input" id="switchShortcutInput" tabindex="0">Shift+Tab</div>
              </div>
            </div>
          </div>
          <div>
            <div class="settings-group-title">服务商管理</div>
            <div class="settings-group">
              <div class="provider-list" id="providerList"></div>
              <button class="btn-add-provider" id="btnAddProvider">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                添加自定义服务商
              </button>
            </div>
          </div>
          <div>
            <div class="settings-group-title">关于</div>
            <div class="settings-group">
              <div class="settings-row">
                <div>
                  <div class="settings-row-label">MineAI Hub</div>
                  <div class="settings-row-hint" id="appVersion">v1.0.3</div>
                </div>
              </div>
              <div class="settings-row">
                <div>
                  <div class="settings-row-label">检查更新</div>
                  <div class="settings-row-hint" id="updateHint">点击检查是否有新版本</div>
                </div>
                <button class="btn-sm btn-ghost" id="btnCheckUpdate">检查更新</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Add Provider Modal -->
      <div class="modal-overlay" id="addProviderModal">
        <div class="modal">
          <div class="modal-header">
            <span class="modal-title" id="modalTitle">添加自定义服务商</span>
            <button class="modal-close" id="modalClose">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="modal-body">
            <div class="modal-field" id="modalFieldGroup">
              <label for="modalName">名称</label>
              <input type="text" id="modalName" placeholder="例如：ChatGPT" maxlength="20">
            </div>
            <div class="modal-field" id="modalFieldUrl">
              <label for="modalUrl">网址</label>
              <input type="url" id="modalUrl" placeholder="https://chat.openai.com">
            </div>
            <div class="modal-field" id="modalFieldIcon">
              <label>图标</label>
              <div class="icon-upload-area">
                <div class="icon-preview" id="iconPreview" title="点击上传图片">?</div>
                <div class="icon-options">
                  <div class="icon-url-row">
                    <label for="modalIconUrl" class="sr-only">图标网址</label>
                    <input type="url" id="modalIconUrl" placeholder="图标网址（可选）">
                    <button class="btn-sm btn-ghost" id="btnFetchIcon">获取</button>
                  </div>
                  <div class="icon-hint">点击左侧预览区上传本地图片，或输入图标网址后点击"获取"</div>
                </div>
              </div>
              <input type="file" id="iconFileInput" accept="image/*" style="display:none">
            </div>
            <div class="color-row" id="modalColorRow">
              <div class="color-field">
                <label for="modalColorDark">暗色模式侧边栏</label>
                <div class="color-picker-wrap">
                  <input type="color" id="modalColorDark" value="#1a1e28">
                  <span id="modalColorDarkHex">#1a1e28</span>
                </div>
              </div>
              <div class="color-field">
                <label for="modalColorLight">亮色模式侧边栏</label>
                <div class="color-picker-wrap">
                  <input type="color" id="modalColorLight" value="#f0f2f5">
                  <span id="modalColorLightHex">#f0f2f5</span>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn-sm btn-ghost" id="modalCancel">取消</button>
            <button class="btn-sm btn-primary" id="modalSave">添加</button>
          </div>
        </div>
      </div>

      <!-- Update Banner -->
      <div class="update-banner" id="updateBanner">
        <div class="update-banner-text" id="updateBannerText">发现新版本</div>
        <div class="update-progress" id="updateProgress" style="display:none">
          <div class="update-progress-bar" id="updateProgressBar"></div>
        </div>
        <button class="update-banner-btn primary" id="btnUpdateAction">下载更新</button>
        <button class="update-banner-btn ghost" id="btnUpdateDismiss">忽略</button>
      </div>

      <!-- Loading Overlay -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span id="loadingText">正在加载…</span>
      </div>

      <!-- Status Indicator -->
      <div class="status-indicator" id="statusIndicator"></div>

      <!-- Menubar Mode Indicator -->
      <div class="menubar-indicator">菜单栏模式</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>
  </body>
</html>
