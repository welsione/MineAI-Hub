appId: com.mineai.hub
productName: MineAI Hub
directories:
  output: dist
  buildResources: assets

asar: true

extraResources:
  - from: "assets"
    to: "assets"
    filter:
      - "*.png"

files:
  - "electron/**/*"
  - "src/**/*"
  - "package.json"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
